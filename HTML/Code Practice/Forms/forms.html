<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms Learning</title>
</head>

<body>
    <form action="post">
        <div>
            <label for="username">Enter your username</label>
            <input type="text" id="username" name="username" placeholder="Enter here !!">
        </div>
        <div>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">female</label>
        </div>
        <div>
            <input type="checkbox" id="check1" name="hi" value="yes">
            <label for="check1">Check me !!</label>
            <input type="checkbox" id="check2" name="hi" value="yes">
            <label for="check2">Check me also !!</label>
        </div>
        <div>
            <textarea name="Gyan" rows="5" cols="50"># Gyan idhar de </textarea>
        </div>
        <div>
            <select name="games">
                <option value="">Select One</option>
                <option value="ff">Free Fire</option>
                <option value="bgmi">Battle Ground Mobile India</option>
                <option value="coc">Clash Of Clans</option>
            </select>
        </div>
    </form>
</body>

</html>
