<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/utility.css" />
  </head>
  <body>
    <nav class="bg-black flex">
      <img class="logo filter" src="./photos/logo.svg" alt="" />
      <div class="circle-container flex">
        <img class="home filter" src="./photos/home.svg" alt="home" />
      </div>
      <div class="search flex">
        <div class="search-container flex">
          <img class="search filter" src="./photos/search.svg" alt="" />
          <input
            class="search-txt bg-black"
            type="text"
            placeholder="What do you want to play?"
          />
        </div>
      </div>
      <div class="nav-buttons">
        <button class="nav-btn">Premium</button>
        <button class="nav-btn">Support</button>
        <button class="nav-btn">Download</button>
        <h1>|</h1>
        <button class="nav-btn dwnld-btn flex">
          <img class="search filter" src="./photos/download.svg" alt="" />
          Install App</button>
        <button class="nav-btn">Sign up</button>
        <button class="login-btn">Log in</button>
      </div>
    </nav>
  </body>
</html>
