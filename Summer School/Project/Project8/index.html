<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Movie Shelf</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="movieShelf">
        <h1 id="pageTitle">My Movie Shelf</h1>

        <div id="movieForm">
            <input type="text" id="movieNameBox" placeholder="Type a movie name...">
            <button id="saveMovieBtn">+ Add</button>
        </div>

        <div id="movieArea">
            <ul id="movieCards"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
