<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table,
        th,
        td {
            border: 3px solid darkblue;
        }
        tr:nth-child(2){
            color: brown;
            background: red;
        }
    </style>
</head>

<body>
    <table>
        <th>Name</th>
        <th>Roll No</th>
        <th>Class</th>
        <tr>
            <td>A</td>
            <td>01</td>
            <td>01</td>
        </tr>
        <tr>
            <td>B</td>
            <td>02</td>
            <td>01</td>
        </tr>
        <tr>
            <td>C</td>
            <td>03</td>
            <td>01</td>
        </tr>

    </table>
</body>

</html>
