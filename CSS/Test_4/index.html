<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        .navbar {
            height: 60px;
            display: flex;
            gap: 20px;
            justify-content: end;
            align-items: center;
            padding: 5px;
        }

        .left-part{
            display: flex;
            flex-direction: row;
            margin-right: auto;
        }

        .first {
            font-size: 28px;
            font-weight: bolder;
        }

        p {
            margin: 0px;
            padding: 0px;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="left-part">
            <div class="box0">
                <img src="./Logo.jpg" height="50px">
            </div>
            <div class="box1">
                <p class="first">
                    UltraFlex
                </p>
                <p class="second">
                    Lorem ipsum dolor sit amet.
                </p>
            </div>
        </div>
        <div class="box2">Products ▼</div>
        <div class="box3">Pricing ▼</div>
        <div class="box4">Resources ▼</div>
        <div class="box5">About_Us ▼</div>
        <div class="box6">
            <img src="./translator.png" height="45px">
        </div>
    </div>
</body>

</html>
