<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Layout</title>
    <style>
        .boxes{
            background-color: black;
            text-align: center;
        }
        .box1{
            background-color: pink;
            height: 50px;
            position: sticky;
            top: 0;
        }
        .box2{
            margin: 15px;
            background-color: green;
            height: 350px;
            gap: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box3{
            border: 3px solid black;
            background-color: yellow;
            height: 200px;
            border-radius: 50px;
            margin: 15px;
        }
        .box4{
            background-color: blue;
            height: 35px;
        }
        .box5{
            border: 1px solid black;
            background-color: red;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            bottom: 20px;
            right: 25px;
            position: fixed;
        }
        .bbox1,.bbox2{
            margin: 0px;
            background-color: orange;
            width: 300px;
            height: 300px;
        }
        p{
            margin-top:80px;
        }
    </style>
</head>
<body>
    <div class="boxes">
        <div class="box1"></div>
        <div class="box2">
            <div class="bbox1"></div>
            <div class="bbox2"></div>
        </div>
        <div class="box3">
            <p>Welcome to My World</p>
        </div>
        <div class="box4"></div>
        <div class="box5"></div>
    </div>
</body>
</html>
