<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Positioning</title>
    <style>

        *{
            margin: 0px;
            padding: 0px;
        }
        .parent{
            border: 10px solid aquamarine;
            height: 200vh;
            width: 90vw;
            margin: 30px;
        }
        .box{
            width: 80vw;
            height: 10vh;
            border: 5px solid black;
            margin: 3px;
        }
        .box1{
            background-color: firebrick;
            position: absolute;
            /* Can also be done by:-
                transform:translate(0)
                filter:invert(0)
                perspective: 0em; */
            top: 0px;
            /* With respect to nearest positioned parent box (if not any then w.r.t. html) */
        }
        .box2{
            background-color: wheat;
            position: relative;
            top: 30px;
            left: 15px;
        }
        .box3{
            background-color: lawngreen;
            position: fixed;
            top: 40vh;
            left: 10vw;
        }
        .box4{
            background-color: blueviolet;
            position: sticky;
            top: 0px;
        }
        
    </style>
</head>
<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
    
</body>
</html>
