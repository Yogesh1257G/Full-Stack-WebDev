<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing Ball Animation</title>
    <style>
        .box{
            height: 60vh;
            background-color: blue;
            position: relative;
        }
        .ball{
            width: 35px;
            height: 35px;
            border-radius: 50px;
            background-color: red;
            position: absolute;
            left: 0;
            bottom: 0;
            animation: bounceX 5s linear infinite , bounceY 1s ease-out infinite alternate;
        }
        @keyframes bounceX {
          from{
            left: 0;
          }
          to{
            left: 100%;
          }
    }
      @keyframes bounceY {
          from{
            bottom: 0;
          }
          to{
            bottom: 100%;
          }
    }
    </style>
</head>
<body>
    <div class="box">
        <div class="ball"></div>
    </div>
</body>
</html>
