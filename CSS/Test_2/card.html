<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
        .box{
            background-color: black;
            width: 350px;
            height: 475px;
            border-radius: 7px;
        }
        .image{
            padding: 10px;
        }
        .image img{
            border-radius: 7px;
        }
        .text{
            color: white;
            padding: 2px;
        }
        .capsule{   
            color: white;
            padding: 5px;
        }
        .capsule span{
            border: 2px solid white;
            border-radius: 20px;
            padding: 5px;
            margin: 2px;
        }
        .rm{
            color: white;
            text-align: center;
        }
        .rm button{
            border: 2px solid white;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="image">
            <img width="330px" src="..//Test_2/Luffy_4K.png" alt="">
        </div>
        <div class="capsule">
            <span>Crew</span>
            <span>Hawki</span>
        </div>
        <div class="text">
            <h1>Monkey D Luffy</h1>
            <h2>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Earum beatae eos itaque praesentium dolor odio.</h2>
        </div>
        <div class="rm">
            <button>Read More</button></div>
    </div>
</body>
</html>
